name: floating_video_player
description: >-
  A Flutter package for a YouTube-style floating video player. Supports
  picture-in-picture mini-player with snap-to-corner physics, portrait/landscape
  orientation handling, spring-physics drag gestures, and a customisable controls
  layer built on top of video_player.
version: 0.1.2
homepage: https://github.com/usmanvrtx/floating_video_player

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  video_player: ^2.10.1

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true